spring.application.name=ai-interview-assistant
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# Temporary in-memory DB setup (H2)
spring.datasource.url=jdbc:h2:mem:interview_assistant;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging Configuration
logging.level.com.interview.assistant=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=always

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

spring.jackson.serialization.write-dates-as-timestamps=false

# Optional AI provider settings (used when no DB answer is found).
app.ai.enabled=false
app.ai.provider=gemini
app.ai.api-url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
app.ai.model=gemini-1.5-flash
app.ai.api-key=
